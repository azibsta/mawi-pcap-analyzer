<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAWI Traffic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .dashboard { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #e3f2fd; padding: 15px; border-radius: 6px; text-align: center; }
        .stat-box h3 { margin: 0 0 10px 0; font-size: 14px; color: #555; }
        .stat-box p { margin: 0; font-size: 24px; font-weight: bold; color: #1976d2; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>MAWI Traffic Research Trends</h1>
    
    <div class="stats-grid">
        <div class="stat-box">
            <h3>Years Analyzed</h3>
            <p id="stat-years">--</p>
        </div>
        <div class="stat-box">
            <h3>Max Encrypted Traffic</h3>
            <p id="stat-enc">--%</p>
        </div>
        <div class="stat-box">
            <h3>Highest Anomaly Score</h3>
            <p id="stat-anom">--</p>
        </div>
    </div>

    <div class="card">
        <h2>Protocol Trends (TCP vs UDP)</h2>
        <canvas id="protocolChart"></canvas>
    </div>

    <div class="card">
        <h2>Encryption Growth & Anomalies</h2>
        <canvas id="encryptionChart"></canvas>
    </div>
</div>

<script>
    // Fetch the JSON generated by your Python pipeline
    // Adjust the filename if your export named it differently
    fetch('../reports/trends_2006_2025.json')
        .then(response => response.json())
        .then(data => {
            const records = data.data; // The array of yearly stats
            
            const years = records.map(r => r.year);
            const tcpData = records.map(r => r.tcp_pct_pkts);
            const udpData = records.map(r => r.udp_pct_pkts);
            const encData = records.map(r => r.encrypted_bytes_pct);
            const anomData = records.map(r => r.anomaly_zscore);

            // Update Top Stats
            document.getElementById('stat-years').innerText = years.length;
            document.getElementById('stat-enc').innerText = Math.max(...encData).toFixed(1) + '%';
            document.getElementById('stat-anom').innerText = Math.max(...anomData).toFixed(2);

            // Chart 1: Protocols
            new Chart(document.getElementById('protocolChart'), {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'TCP %', data: tcpData, borderColor: '#1976d2', tension: 0.3 },
                        { label: 'UDP %', data: udpData, borderColor: '#388e3c', tension: 0.3 }
                    ]
                }
            });

            // Chart 2: Encryption and Anomalies
            new Chart(document.getElementById('encryptionChart'), {
                type: 'bar',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'Encrypted %', data: encData, backgroundColor: '#9c27b0', type: 'line', tension: 0.3 },
                        { label: 'Anomaly Z-Score', data: anomData, backgroundColor: '#ff9800' }
                    ]
                }
            });
        })
        .catch(err => console.error("Error loading data. Make sure you are running a local server!", err));
</script>
</body>
</html>
